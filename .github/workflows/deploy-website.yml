name: Deploy website

# Publishes the static site under website/ to the Linode box by rsyncing it to
# nginx's document root. Static files are served straight from disk, so there's
# no build step and no nginx reload needed — new files are live the moment they
# land. (website/deploy.sh remains for first-time infra setup: nginx vhost,
# certbot, etc. — this workflow only handles content updates.)
#
# Required repo secrets:
#   LINODE_HOST        hostname or IP of the box
#   LINODE_USER        SSH user with WRITE access to the web root below
#   LINODE_DEPLOY_KEY  private SSH key whose public half is in authorized_keys
#
# Required repo variable (Settings → Secrets and variables → Actions → Variables):
#   WEBSITE_ROOT       absolute path nginx serves commonsc.io from.
#                      ⚠️ Confirm before first run — the README diagram says
#                      /srv/website but the legacy script used /var/www/commonsc.
#                      Check with:  grep -R "root " /etc/nginx/sites-available/commonsc.io
#                      The deploy user must be able to write to this path
#                      (chown it to that user, or add group-write).

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch: {}

# Content deploys are cheap and idempotent — latest push wins.
concurrency:
  group: deploy-website
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.LINODE_DEPLOY_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.LINODE_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync website → web root
        run: |
          rsync -az --omit-dir-times \
            --exclude 'deploy.sh' \
            --exclude 'README*' \
            -e "ssh -i ~/.ssh/id_deploy -o BatchMode=yes" \
            website/ \
            "${{ secrets.LINODE_USER }}@${{ secrets.LINODE_HOST }}:${{ vars.WEBSITE_ROOT }}/"
          # To also prune files that were removed from the repo, add --delete —
          # but only once you've confirmed WEBSITE_ROOT is the dedicated site
          # directory, since --delete will remove anything else living there.
