<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>CommonSense status</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="Live status of the CommonSense marketplace endpoints." />
<meta name="robots" content="noindex">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #EDE5D3;
    --paper: #FBF6EC;
    --ink: #231C12;
    --ink-soft: #5A4B36;
    --ink-mute: #8B7A60;
    --moss: #3D5A3A;
    --amber: #A8762A;
    --rust: #8E4A26;
    --rule: rgba(60, 40, 18, 0.14);
    --serif: "Cormorant Garamond", Georgia, serif;
    --sans: "Inter", -apple-system, system-ui, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  body {
    background:
      radial-gradient(circle at 1px 1px, var(--rule) 1px, transparent 0) 0 0/24px 24px,
      var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 24px;
  }
  .frame {
    width: 100%;
    max-width: 620px;
    background: var(--paper);
    border: 0.5px solid var(--rule);
    border-radius: 14px;
    padding: 36px;
  }
  .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-bottom: 10px;
  }
  h1 {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 36px;
    letter-spacing: -0.02em;
    margin: 0 0 6px;
  }
  h1 em { font-style: italic; color: var(--moss); }
  .summary {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-mute);
    margin-bottom: 28px;
  }
  .summary.ok    { color: var(--moss); }
  .summary.degraded { color: var(--amber); }
  .summary.down  { color: var(--rust); }
  .check {
    display: grid;
    grid-template-columns: 18px 1fr max-content;
    align-items: center;
    gap: 14px;
    padding: 16px 0;
    border-top: 0.5px dashed var(--rule);
  }
  .check:first-of-type { border-top: none; }
  .dot {
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--ink-mute);
    transition: background-color 0.3s, box-shadow 0.3s;
  }
  .dot.ok   { background: var(--moss); box-shadow: 0 0 8px rgba(61, 90, 58, 0.45); }
  .dot.fail { background: var(--rust); box-shadow: 0 0 8px rgba(142, 74, 38, 0.45); }
  .name {
    font-family: var(--serif);
    font-size: 19px;
    font-weight: 500;
    line-height: 1.2;
  }
  .name small {
    display: block;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-mute);
    margin-top: 4px;
    font-weight: 400;
  }
  .meta {
    font-family: var(--mono);
    font-size: 11px;
    text-align: right;
    color: var(--ink-mute);
    letter-spacing: 0.04em;
  }
  .meta .status-label { color: var(--ink); display: block; }
  .meta .status-label.ok   { color: var(--moss); }
  .meta .status-label.fail { color: var(--rust); }
  footer {
    margin-top: 24px;
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--ink-mute);
    text-align: center;
    letter-spacing: 0.06em;
  }
  footer a { color: var(--moss); text-decoration: none; }
  footer a:hover { text-decoration: underline; text-underline-offset: 3px; }
  .ticker {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--ink-mute);
    text-align: center;
    margin-top: 12px;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>

<div class="frame">
  <div class="eyebrow">Live status</div>
  <h1>CommonSense <em>marketplace.</em></h1>
  <div class="summary" id="summary">Checking…</div>

  <div class="check" id="check-discovery">
    <span class="dot" id="dot-discovery"></span>
    <div class="name">
      Discovery contract
      <small>commonsc.io/.well-known/commonsc.json</small>
    </div>
    <div class="meta">
      <span class="status-label" id="label-discovery">—</span>
      <span id="time-discovery">—</span>
    </div>
  </div>

  <div class="check" id="check-api">
    <span class="dot" id="dot-api"></span>
    <div class="name">
      API
      <small>api.commonsc.io/health</small>
    </div>
    <div class="meta">
      <span class="status-label" id="label-api">—</span>
      <span id="time-api">—</span>
    </div>
  </div>

  <div class="check" id="check-catalog">
    <span class="dot" id="dot-catalog"></span>
    <div class="name">
      Catalog
      <small>api.commonsc.io/registry/index.json</small>
    </div>
    <div class="meta">
      <span class="status-label" id="label-catalog">—</span>
      <span id="time-catalog">—</span>
    </div>
  </div>

  <div class="check" id="check-llms">
    <span class="dot" id="dot-llms"></span>
    <div class="name">
      LLM-facing companion
      <small>commonsc.io/llms.txt</small>
    </div>
    <div class="meta">
      <span class="status-label" id="label-llms">—</span>
      <span id="time-llms">—</span>
    </div>
  </div>

  <div class="ticker" id="ticker">probing…</div>
</div>

<footer>
  Refreshes every 30 seconds · <a href="https://commonsc.io">back to commonsc.io</a>
</footer>

<script>
(() => {
  const checks = [
    {
      key: "discovery",
      url: "https://commonsc.io/.well-known/commonsc.json",
      // Tolerate a JSON parse to confirm the body isn't truncated.
      validate: async (r) => { await r.json(); },
    },
    {
      key: "api",
      url: "https://api.commonsc.io/health",
      validate: async (r) => {
        const t = (await r.text()).trim();
        if (t !== "ok") throw new Error("unexpected health body");
      },
    },
    {
      key: "catalog",
      url: "https://api.commonsc.io/registry/index.json",
      validate: async (r) => {
        const j = await r.json();
        if (!Array.isArray(j.entries)) throw new Error("catalog missing entries");
      },
    },
    {
      key: "llms",
      url: "https://commonsc.io/llms.txt",
      validate: async (r) => {
        const t = await r.text();
        if (t.length < 200) throw new Error("llms.txt is implausibly short");
      },
    },
  ];

  async function probeOne(check) {
    const start = performance.now();
    try {
      const r = await fetch(check.url, { cache: "no-store", credentials: "omit" });
      if (!r.ok) throw new Error("HTTP " + r.status);
      await check.validate(r);
      return { ok: true, ms: Math.round(performance.now() - start) };
    } catch (err) {
      return { ok: false, ms: Math.round(performance.now() - start), err: err.message || String(err) };
    }
  }

  function setRow(key, result) {
    const dot = document.getElementById("dot-" + key);
    const label = document.getElementById("label-" + key);
    const time = document.getElementById("time-" + key);
    dot.classList.toggle("ok", result.ok);
    dot.classList.toggle("fail", !result.ok);
    label.classList.toggle("ok", result.ok);
    label.classList.toggle("fail", !result.ok);
    label.textContent = result.ok ? "operational" : "down";
    time.textContent = result.ok ? result.ms + " ms" : result.err;
  }

  function setSummary(results) {
    const total = results.length;
    const ok = results.filter((r) => r.ok).length;
    const summary = document.getElementById("summary");
    summary.classList.remove("ok", "degraded", "down");
    if (ok === total) {
      summary.classList.add("ok");
      summary.textContent = "All systems operational · " + ok + "/" + total + " checks passing";
    } else if (ok === 0) {
      summary.classList.add("down");
      summary.textContent = "All systems down · 0/" + total + " checks passing";
    } else {
      summary.classList.add("degraded");
      summary.textContent = "Partial outage · " + ok + "/" + total + " checks passing";
    }
  }

  async function probeAll() {
    const results = await Promise.all(checks.map(probeOne));
    results.forEach((r, i) => setRow(checks[i].key, r));
    setSummary(results);
    const stamp = new Date().toLocaleTimeString();
    document.getElementById("ticker").textContent = "last checked " + stamp;
  }

  probeAll();
  setInterval(probeAll, 30_000);
})();
</script>
</body>
</html>
