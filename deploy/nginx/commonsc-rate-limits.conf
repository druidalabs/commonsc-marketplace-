## Per-IP rate limit zones for the marketplace endpoints.
##
## Deployed to /etc/nginx/conf.d/commonsc-rate-limits.conf and auto-included
## by the http {} block in /etc/nginx/nginx.conf via its
## `include /etc/nginx/conf.d/*.conf;` line.
##
## The actual `limit_req` directives that consume these zones live in the
## per-endpoint location blocks of api.commonsc.io.conf — see the publish +
## register locations there.
##
## Sizing:
##   - 10m zone ≈ 160,000 distinct IPs tracked. Plenty for early launch.
##   - $binary_remote_addr is 4 bytes (IPv4) or 16 bytes (IPv6) + state; the
##     overall budget is about 16,000 IPs per megabyte.
##
## Rate floor is 1r/m because nginx's `limit_req_zone` only accepts r/s or
## r/m — there is no r/h or r/d unit. With burst the practical caps are
## (burst + 60·hours) requests per hour, which is plenty to block opportunistic
## floods. Stricter daily caps (e.g. truly 10/day) need app-level enforcement.

limit_req_zone $binary_remote_addr zone=commonsc_publish:10m  rate=1r/m;
limit_req_zone $binary_remote_addr zone=commonsc_register:10m rate=1r/m;

# Surface limit_req rejections as 429 (default would be 503 — wrong semantic
# for client-rate-limit and confusing in monitoring).
limit_req_status 429;
