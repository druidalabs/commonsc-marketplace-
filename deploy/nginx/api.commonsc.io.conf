## nginx server block for api.commonsc.io
##
## ⚠️  IMPORTANT — DO NOT `cp` THIS FILE OVER A RUNNING DEPLOY.
##
## This file is the **pre-certbot** template. Certbot rewrites the live
## /etc/nginx/sites-available/api.commonsc.io in place to add the TLS lines
## (listen 443 ssl, ssl_certificate paths, the 80 → 443 redirect). Copying
## this template over the live config strips those edits and leaves nginx
## with no server block matching api.commonsc.io on :443 — connections fall
## through to whatever the first :443 server is, which is wrong and
## confusing to diagnose.
##
## Safe deploy patterns:
##   1. First-time install only: `sudo cp ...` once, then `sudo certbot --nginx`.
##   2. To change routes/auth/proxy bits later: edit the live file in place,
##      OR `cp` this template + immediately re-run `sudo certbot --nginx -d api.commonsc.io`
##      (idempotent, re-adds the TLS lines).
##   3. Long-term: split TLS config into a separate include we don't touch.
##
## The marketplace binary listens on 127.0.0.1:8787 (localhost only). All
## public traffic goes through nginx, which handles TLS termination, request
## logging, and rate limiting (if/when we add it).

upstream commonsc_marketplace {
    server 127.0.0.1:8787;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.commonsc.io;

    # certbot will add a 301 → https redirect here when it provisions the cert.

    # Reasonable defaults for an algorithm-bundle CDN that occasionally
    # accepts ~MB uploads on /algorithms/publish.
    client_max_body_size 32M;
    client_body_buffer_size 1M;
    sendfile on;

    # Public catalog + manifests are static-ish; cache them at the nginx
    # layer so we don't hammer the Rust process for every catalog pull.
    location /registry/ {
        proxy_pass http://commonsc_marketplace;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_valid 200 60s;
        add_header X-CommonSC-Surface "registry" always;
    }

    location /schemas/ {
        proxy_pass http://commonsc_marketplace;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_valid 200 5m;
        add_header X-CommonSC-Surface "schemas" always;
    }

    # Rate-limited write endpoints. These exact-match locations win over the
    # generic /algorithms/ prefix below. Zones are defined in conf.d/commonsc-
    # rate-limits.conf.
    #
    # burst=10 nodelay on publish: a publisher can ship up to 10 requests in
    # quick succession (e.g. bumping versions of a few algorithms back-to-back),
    # then is throttled to 1/min sustained. Rejections return JSON 429 via the
    # @rate_limited named location.
    location = /algorithms/publish {
        limit_req zone=commonsc_publish burst=10 nodelay;
        proxy_pass http://commonsc_marketplace;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_request_buffering off;
        add_header X-CommonSC-Surface "api" always;
    }

    location = /publisher/register {
        limit_req zone=commonsc_register burst=5 nodelay;
        proxy_pass http://commonsc_marketplace;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-CommonSC-Surface "api" always;
    }

    # Stripe Checkout endpoints — desktop creates a session here, then polls
    # for status after the deep-link return. Rate limit caps fraud probing.
    location /payments/ {
        limit_req zone=commonsc_payments burst=10 nodelay;
        proxy_pass http://commonsc_marketplace;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        add_header X-CommonSC-Surface "payments" always;
    }

    # The publish endpoint accepts tar.zst bundles. Larger upload limit and
    # a longer timeout so a slow uploader doesn't get cut off mid-archive.
    location /algorithms/ {
        proxy_pass http://commonsc_marketplace;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_request_buffering off;
        add_header X-CommonSC-Surface "api" always;
    }

    # Reviewer admin UI. HTTP basic auth — single-tenant, just the
    # CommonSense team. The htpasswd file is generated by hand once via:
    #   sudo htpasswd -c /etc/nginx/commonsc-admin.htpasswd <username>
    # See deploy/README.md for the full setup.
    location /admin {
        auth_basic "CommonSense reviewer";
        auth_basic_user_file /etc/nginx/commonsc-admin.htpasswd;
        proxy_pass http://commonsc_marketplace;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-CommonSC-Surface "admin" always;
    }

    # Everything else (discovery doc fetched from the subdomain, health probe,
    # root index, llms.txt) falls through to the marketplace as well.
    location / {
        proxy_pass http://commonsc_marketplace;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # JSON 429 for rate-limited requests. Matches the agent-first contract:
    # clients (humans or agents) get a machine-readable body + Retry-After
    # instead of nginx's default text/html error page.
    error_page 429 = @rate_limited;
    location @rate_limited {
        default_type application/json;
        add_header Retry-After "60" always;
        add_header X-CommonSC-Surface "rate-limit" always;
        return 429 '{"ok":false,"error":"rate_limited","message":"too many requests; slow down and try again later","retryAfterSeconds":60}';
    }

    access_log /var/log/nginx/api.commonsc.io.access.log;
    error_log  /var/log/nginx/api.commonsc.io.error.log;
}
