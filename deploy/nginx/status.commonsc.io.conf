## nginx server block for status.commonsc.io
##
## Pure static — no upstream. The status page probes the marketplace from the
## browser, so the box doesn't need a status daemon. If the marketplace is
## down, the page still loads (from this nginx) and the badges go red.
##
## After first deploy, run `sudo certbot --nginx -d status.commonsc.io`.
## certbot edits this file in place to add the TLS directives. Same caveat
## as api.commonsc.io: don't `cp` this template over the live file later
## without re-running certbot. See deploy/UPDATE-NGINX.md.

server {
    listen 80;
    listen [::]:80;
    server_name status.commonsc.io;

    root /srv/commonsc/deploy/status;
    index index.html;

    # Don't cache the status page — we want freshness, not stale "all green"
    # responses when something's failing.
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }

    # Suppress noisy bot scans / index-prevention.
    location = /robots.txt {
        add_header Content-Type "text/plain" always;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    access_log /var/log/nginx/status.commonsc.io.access.log;
    error_log  /var/log/nginx/status.commonsc.io.error.log;
}
