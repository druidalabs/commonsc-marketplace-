# Systemd drop-in for the Stripe secret key.
#
# Copy this file to the live unit's drop-in directory on the marketplace box,
# fill in the real key, then daemon-reload + restart the service:
#
#   sudo cp deploy/systemd/stripe-secret.example.conf \
#           /etc/systemd/system/commonsc-marketplace.service.d/stripe.conf
#   sudo $EDITOR /etc/systemd/system/commonsc-marketplace.service.d/stripe.conf
#   sudo chmod 600 /etc/systemd/system/commonsc-marketplace.service.d/stripe.conf
#   sudo systemctl daemon-reload
#   sudo systemctl restart commonsc-marketplace
#
# The chmod 600 is important — the file contains a live API key. Only root
# should read it; systemd reads it as root before the service drops to the
# commonsc user.
#
# Test mode (sk_test_...) → switch to live mode (sk_live_...) by editing this
# file and restarting. No code changes needed.

[Service]
Environment="STRIPE_SECRET_KEY=sk_test_REPLACE_ME"
